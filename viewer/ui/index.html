<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tracing Dashboard</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-brand">
        <div class="app-logo" aria-hidden="true">∿</div>
        <div>
          <h1>Tracing Dashboard</h1>
        </div>
      </div>
      <div class="app-status">
        <span class="status-pill" id="connectionStatus">未连接</span>
        <span class="status-text">更新: <strong id="lastUpdated">--:--:--</strong></span>
        <button class="ghost-button app-action" id="refreshButton" type="button">刷新</button>
      </div>
    </header>
    <nav class="workspace-tabs">
      <button class="workspace-tab" data-app-view="api" type="button">API 调用</button>
      <button class="workspace-tab is-active" data-app-view="trace" type="button">会话追踪</button>
    </nav>
    <div class="scene scene-trace shell" id="traceScene">
      <aside class="pane pane-sessions">
        <div class="pane-head">
          <div>
            <h1 id="listTitle">会话列表</h1>
          </div>
        </div>
        <div class="controls">
          <label class="field">
            <span>Agent</span>
            <select id="agentFilter"></select>
          </label>
          <label class="field field-search">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="session / trace / 内容关键词">
          </label>
          <label class="field api-only">
            <span>Provider</span>
            <select id="providerFilter"></select>
          </label>
          <label class="field api-only">
            <span>Model</span>
            <select id="modelFilter"></select>
          </label>
          <label class="field api-only">
            <span>状态</span>
            <select id="statusFilter">
              <option value="all">全部状态</option>
              <option value="ok">仅成功</option>
              <option value="error">仅失败</option>
              <option value="unreported">仅 Token 未上报</option>
            </select>
          </label>
        </div>
        <div class="content-search-results" id="contentSearchResults" hidden></div>
        <div class="session-list" id="sessionList" data-scroll-key="trace-session-list"></div>
      </aside>

      <main class="pane pane-traces">
        <div class="pane-head">
          <div>
            <h2 id="traceTitle">选择一个会话</h2>
          </div>
          <div class="head-meta" id="traceMeta"></div>
        </div>
        <div class="trace-list" id="traceList" data-scroll-key="trace-list"></div>
      </main>

      <section class="pane pane-details">
        <div class="pane-head">
          <div>
            <h2 id="detailsTitle">选择一个 Span</h2>
          </div>
          <div class="tabs">
            <button class="tab is-active" data-tab="content" type="button">输入输出</button>
            <button class="tab" data-tab="metadata" type="button">元数据</button>
            <button class="tab" data-tab="raw" type="button">原始数据</button>
          </div>
        </div>
        <div class="details-body" id="detailsBody" data-scroll-key="trace-details"></div>
      </section>
    </div>
    <main class="scene scene-api" id="apiScene"></main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <p class="empty-title">还没有可展示的数据</p>
        <p class="empty-copy">刷新一下，或者再发一条消息试试。</p>
      </div>
    </template>

    <script src="/app.js"></script>
  </body>
  </html>
